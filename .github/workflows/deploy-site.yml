# Build the Lacuna showcase Astro site (site/) and deploy to GitHub Pages.
#
# The site deploys to lacuna.foundryside.dev (CNAME in site/public/CNAME,
# copied verbatim into the build output). It consumes the shared @weft/site-kit,
# which lives in a SUBDIRECTORY of a DIFFERENT repo (foundryside-dev/weft). The
# fetch step sparse-checks-out that subdirectory into site/vendor/site-kit/ so
# the `file:./vendor/site-kit` dependency resolves; npm install then builds it.
name: Deploy showcase site

on:
  push:
    branches: [main]
    # Rebuild when the site source changes.
    paths:
      - 'site/**'
  workflow_dispatch:

# GitHub Pages deploy permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Enable Pages + pin the source to GitHub Actions (build_type=workflow).
        # The 2026-06-14 deploy failed with "Ensure GitHub Pages has been enabled";
        # this makes the workflow self-heal that state instead of 404ing.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch shared site-kit
        # Sparse-fetch packages/site-kit out of the weft repo into
        # site/vendor/site-kit/ so the file: dependency resolves. The preinstall
        # hook also runs this, but doing it explicitly keeps the step legible.
        run: npm run fetch-site-kit

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        # prebuild hook copies @weft/site-kit/assets into public/_site-kit.
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
