expected_rule = "subsystem"

[[lacuna]]
id = "lw-inheritance"
file = "specimen/repository.py"
symbol = "InMemoryRepository"
category = "navigation"
demonstrates = ["loomweave"]
explanation = "specimen.repository.InMemoryRepository inherits from both Repository and TimestampMixin, and BookRepository/UserRepository inherit from it — the Python plugin's inherits_from relation edges (ontology 0.8.0, ADR-051) record the hierarchy, and Loomweave's entity_relation_list walks it both ways (direction=in answers \"what subclasses X\")."
expected_tool = "loomweave"
expected_rule = "inherits-from"

[[lacuna]]
id = "lw-decorator"
