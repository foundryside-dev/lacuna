expected_rule = "pw-surface-scoping"

# ── Plainweave peer-facts capability demos (pw-requirements-enrichment / pw-wardline-peer-facts) ──
# Planted 2026-06-28. The two cross-member peer-facts producers Plainweave shipped MCP-first in
# 1.1, now exercised over the CLI: requirements-enrichment (the producer for Warpline's reserved
# enrichment.requirements slot) and wardline-peer-facts (sibling-owned .wardline/ findings
# surfaced as advisory context; Plainweave never scans). Both are advisory/local/verdict-free
# and assert the load-bearing NO-SILENT-CLEAN invariant, not just happy paths.
#
# CAPABILITY-GATED (PDR-0016): the CLI subcommands these cells drive land with Plainweave
# PDR-015 (plainweave >= 1.1) and are ABSENT from the brief-pinned PyPI 1.0.0. So each cell's
# `expected_tool` is a per-subcommand capability (plainweave-{requirements-enrichment,
# wardline-peer-facts}), probed from the live `plainweave --help` surface — NOT the bare
# `plainweave` binary. Under 1.0.0 the surface is absent → the cells render `[N/A]` and are
# gated OUT of verify's coverage assertion (honestly unavailable, not red, not faked green);
# install a plainweave that carries the subcommands and they light up green automatically.

[[lacuna]]
id = "pw-requirements-enrichment"
file = "specimen/cli.py"
symbol = "_add_book"
category = "peer-facts"
demonstrates = ["plainweave", "plainweave+warpline"]
explanation = "NOT A FLAW — a positive plainweave capability demo. Over the covered+uncovered seed, `plainweave requirements-enrichment` is the Plainweave producer for Warpline's reserved enrichment.requirements slot: a covered surface (cli._add_book) reports `present` with non-empty requirements; the recorded-but-unbound orphan (tour.__main__.main) reports `absent`; and a well-formed-but-absent locator reports `unavailable` — an identity gap is 'cannot tell', NEVER a silent `absent`. The load-bearing no-silent-clean contract. Advisory, local-only, never gates. Capability-gated on the `requirements-enrichment` CLI surface (PDR-0016): renders [N/A] under a plainweave that lacks it (e.g. PyPI 1.0.0)."
expected_tool = "plainweave-requirements-enrichment"
expected_rule = "pw-requirements-enrichment"

[[lacuna]]
id = "pw-wardline-peer-facts"
file = "specimen/peerfacts.py"
symbol = "unsafe_sink"
category = "peer-facts"
demonstrates = ["plainweave", "plainweave+wardline"]
explanation = "NOT A FLAW — a positive plainweave capability demo. `plainweave wardline-peer-facts` reads sibling-owned .wardline/ snapshots as advisory peer facts (Plainweave never scans; Wardline owns the trust gate). Over a frozen two-snapshot fixture with scan-identity manifests: an active defect and a non-defect finding surface as advisory context; a finding gone from the latest in-scope snapshot is reported resolved_or_unseen while an out-of-scope prior finding is honestly flagged (wardline_scope_mismatch), never silently resolved; and an absent .wardline/ yields freshness=unavailable, never clean. Advisory, local-only, never gates. Capability-gated on the `wardline-peer-facts` CLI surface (PDR-0016): renders [N/A] under a plainweave that lacks it (e.g. PyPI 1.0.0)."
expected_tool = "plainweave-wardline-peer-facts"
expected_rule = "pw-wardline-peer-facts"

# ── MCP-attachment capability demos (mcp-attach-*) ──────────────────────────────
# Planted 2026-06-28. Each member (loomweave, filigree, wardline, legis, warpline,
# plainweave) is spawned via .mcp.json, must initialize, and must bind its
# server-side store to the staged lacuna repo (via .weft/ or similar). Silent
# de-attach (the member starts clean but cannot read its store) is the seam-integrity
# risk class. These are NOT-A-FLAW capability demos: the rule_token is "mcp-attach"
# + member name; coverage() matches it to expected_rule="mcp-attach" +
# symbol=<member>, which must be distinct (cross-match never occurs).

[[lacuna]]
id = "mcp-attach-loomweave"
file = ".mcp.json"
symbol = "loomweave"
category = "mcp-attachment"
demonstrates = ["loomweave"]
explanation = "NOT A FLAW — a federation seam-integrity demo. loomweave's .mcp.json-configured MCP server (`loomweave serve`) spawns, completes the MCP initialize handshake, and binds to the staged lacuna repo via a server-side store read — reachable MCP-first, no CLI fallback. A silent de-attach (a stale build that starts clean but cannot read its repo-scoped store — the 2026-06-26 loomweave incident class) makes this lacuna go dark and trips make verify."
expected_tool = "loomweave"
expected_rule = "mcp-attach"

