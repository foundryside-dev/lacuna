# The catalogue of planted lacunae. Single source of truth: the harness asserts
# each `expected` finding, and the narrative + per-flaw docs are generated from
# this file. Every entry is an INTENTIONAL, permanent demonstration fixture.
#
# Rule IDs were reconciled against live tool output:
#   - PY-WL-101/102/103/104 captured from `wardline scan` (Task 2.3).
#   - dead-entity / circular-import (plus the navigation tokens execution-path /
#     coupling-hotspot / entry-point / subsystem) are emitted by the tour harness
#     when it finds the planted structures in `.weft/loomweave/loomweave.db`; they are
#     not Wardline rule IDs.

[[lacuna]]
id = "wl-trust-violation"
file = "specimen/trust_flow.py"
symbol = "unsafe_account_key"
category = "trust-boundary"
demonstrates = ["wardline", "wardline+loomweave", "wardline+filigree"]
explanation = "Declares return trust ASSURED but returns EXTERNAL_RAW — untrusted data reaches a trusted producer with no validation."
expected_tool = "wardline"
expected_rule = "PY-WL-101"

