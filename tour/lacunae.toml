symbol = "audited"
category = "navigation"
demonstrates = ["loomweave"]
explanation = "specimen.service.audited decorates LibraryService.add_book and register_user — the Python plugin's decorates relation edges anchor decorator→decorated (ADR-051), so entity_relation_list on the decorator enumerates every method it wraps."
expected_tool = "loomweave"
expected_rule = "decorates"

